name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Run weekly on Monday at 08:00 UTC to catch newly published CVEs
    - cron: "0 8 * * 1"

jobs:
  python-audit:
    name: Python — pip-audit (${{ matrix.agent }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        agent: [langchain-agent, strands-agent, autogen-agent]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        working-directory: transactions-agent/${{ matrix.agent }}
        run: pip-audit -r requirements.txt --progress-spinner off

  frontend-audit:
    name: Frontend — pnpm audit
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18]
        pnpm-version: [8]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ matrix.pnpm-version }}
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Audit frontend dependencies
        run: pnpm audit --audit-level moderate

  trivy-scan:
    name: Trivy — filesystem & secrets scan
    runs-on: ubuntu-latest

    permissions:
      security-events: write  # required to upload SARIF results

    steps:
      - uses: actions/checkout@v4

      - name: Trivy — scan for vulnerabilities, secrets & misconfigurations
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
