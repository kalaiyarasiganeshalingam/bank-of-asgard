name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Run weekly on Monday at 08:00 UTC to catch newly published CVEs
    - cron: "0 8 * * 1"

jobs:
  python-audit:
    name: Python — pip-audit (${{ matrix.name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: langchain-agent
            path: transactions-agent/langchain-agent
          - name: autogen-agent
            path: transactions-agent/autogen-agent
          - name: strands-agent
            path: transactions-agent/strands-agent
          - name: transactions-api
            path: transactions-api
          - name: agencies-mcp-server
            path: agencies-mcp-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        working-directory: ${{ matrix.path }}
        run: pip-audit -r requirements.txt --progress-spinner off

  frontend-audit:
    name: Frontend — npm audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: app
        run: npm install

      - name: Audit frontend dependencies
        working-directory: app
        run: npm audit --audit-level moderate

  trivy-scan:
    name: Trivy — filesystem & secrets scan
    runs-on: ubuntu-latest

    permissions:
      security-events: write  # required to upload SARIF results

    steps:
      - uses: actions/checkout@v4

      - name: Trivy — print findings to log
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy — generate SARIF for Security tab
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
