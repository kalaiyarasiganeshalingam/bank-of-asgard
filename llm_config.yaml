# LLM provider configuration for Bank of Asgard AI agents.
#
# provider: openai | gemini | anthropic | bedrock | mistral
# model:    override the default model for the chosen provider
#           (comment out to use the built-in default)
#
# Defaults per provider:
#   openai:    gpt-4o-mini
#   gemini:    gemini-2.5-flash-lite
#   anthropic: claude-sonnet-4-5-20250929
#   bedrock:   eu.anthropic.claude-sonnet-4-6-20250514-v1:0
#   mistral:   mistral-small-latest
#              (uses AWS_DEFAULT_REGION env var, defaults to eu-north-1)
#              With gateway enabled: routed via WSO2 gateway (Anthropic-compatible API).
#              Without gateway: calls Bedrock Converse API directly via boto3.
#              Only supported by the strands agent implementation.

provider: anthropic
# model: claude-sonnet-4-5-20250929

# WSO2 API Gateway — optional, disabled by default.
# When enabled, LLM calls are routed via the gateway using OAuth2 client credentials
# instead of a direct provider API key.
# Set GATEWAY_BASE_URL, GATEWAY_TOKEN_ENDPOINT, GATEWAY_CLIENT_ID, and
# GATEWAY_CLIENT_SECRET in .env. The provider above still determines the default model name.
#
gateway:
  enabled: true
